# Auto-browser docker-compose
# This runs the LvcidPsyche/auto-browser stack.
# See: https://github.com/LvcidPsyche/auto-browser
#
# Usage: docker compose -f docker-compose.auto-browser.yml up -d
#
# Pre-requisites:
#   git clone https://github.com/LvcidPsyche/auto-browser.git external/auto-browser
#   cd external/auto-browser && cp .env.example .env

version: "3.8"

services:
  browser-node:
    build:
      context: ./external/auto-browser/browser-node
    shm_size: 2gb
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:6080/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    environment:
      BROWSER_WIDTH: ${BROWSER_WIDTH:-1280}
      BROWSER_HEIGHT: ${BROWSER_HEIGHT:-800}
      BROWSER_WS_ENDPOINT_FILE: /data/profile/browser-ws-endpoint.txt
      PLAYWRIGHT_SERVER_HOST: 0.0.0.0
      PLAYWRIGHT_SERVER_PORT: 9223
      PLAYWRIGHT_SERVER_ADVERTISED_HOST: browser-node
    volumes:
      - auto_browser_data:/data
    ports:
      - "127.0.0.1:${NOVNC_PORT:-6080}:6080"
      - "127.0.0.1:${VNC_PORT:-5900}:5900"

  controller:
    build:
      context: ./external/auto-browser/controller
    depends_on:
      browser-node:
        condition: service_healthy
    environment:
      API_BEARER_TOKEN: ${AUTO_BROWSER_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      BROWSER_WS_ENDPOINT_FILE: /data/profile/browser-ws-endpoint.txt
      TAKEOVER_URL: ${TAKEOVER_URL:-http://127.0.0.1:6080/vnc.html?autoconnect=true&resize=scale}
      ARTIFACT_ROOT: /data/artifacts
      UPLOAD_ROOT: /data/uploads
      AUTH_ROOT: /data/auth
      APPROVAL_ROOT: /data/approvals
      AUDIT_ROOT: /data/audit
      SESSION_STORE_ROOT: /data/sessions
      JOB_STORE_ROOT: /data/jobs
      MEMORY_ROOT: /data/memory
      MCP_TOOL_PROFILE: ${MCP_TOOL_PROFILE:-curated}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      REQUEST_RATE_LIMIT_ENABLED: ${REQUEST_RATE_LIMIT_ENABLED:-false}
      MAX_SESSIONS: ${MAX_SESSIONS:-1}
      OCR_ENABLED: ${OCR_ENABLED:-true}
    volumes:
      - auto_browser_data:/data
    ports:
      - "127.0.0.1:${AUTO_BROWSER_PORT:-8000}:8000"

volumes:
  auto_browser_data:
